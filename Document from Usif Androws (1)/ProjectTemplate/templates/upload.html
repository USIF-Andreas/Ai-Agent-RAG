<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload CV - RAG CV Matcher</title>
    <link rel="stylesheet" href="/static/main.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Spline+Sans:wght@400;500;600&display=swap');

        :root {
            --bg-1: #0b0f2b;
            --bg-2: #1a0f3d;
            --card: #f6f7fb;
            --ink: #0f172a;
            --muted: #475569;
            --accent: #22d3ee;
            --accent-2: #f97316;
            --accent-3: #a855f7;
            --ring: rgba(34, 211, 238, 0.45);
            --glow: 0 0 30px rgba(168, 85, 247, 0.35), 0 0 60px rgba(34, 211, 238, 0.25);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Spline Sans", sans-serif;
            color: var(--ink);
            background: radial-gradient(1100px 620px at 8% 12%, rgba(168, 85, 247, 0.22), transparent 60%),
                        radial-gradient(900px 520px at 90% 12%, rgba(34, 211, 238, 0.25), transparent 55%),
                        radial-gradient(700px 520px at 80% 80%, rgba(249, 115, 22, 0.18), transparent 55%),
                        linear-gradient(140deg, var(--bg-1), var(--bg-2));
            display: grid;
            place-items: center;
            padding: 32px;
            overflow-x: hidden;
        }

        .bg-orb {
            position: fixed;
            width: 260px;
            height: 260px;
            border-radius: 50%;
            filter: blur(6px);
            opacity: 0.55;
            z-index: 0;
            animation: drift 14s ease-in-out infinite, glowPulse 6s ease-in-out infinite;
        }

        .bg-orb.one {
            top: 8%;
            left: 6%;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.95), rgba(168, 85, 247, 0.08));
        }

        .bg-orb.two {
            bottom: 6%;
            right: 8%;
            width: 320px;
            height: 320px;
            animation-delay: -4s;
            background: radial-gradient(circle, rgba(34, 211, 238, 0.95), rgba(34, 211, 238, 0.08));
        }

        .bg-orb.three {
            top: 50%;
            left: 50%;
            width: 200px;
            height: 200px;
            animation-delay: -8s;
            background: radial-gradient(circle, rgba(249, 115, 22, 0.95), rgba(249, 115, 22, 0.08));
        }

        @keyframes drift {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -20px) scale(1.05); }
            50% { transform: translate(-20px, 30px) scale(0.95); }
            75% { transform: translate(20px, 20px) scale(1.02); }
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.55; }
            50% { opacity: 0.75; }
        }

        .container {
            width: 100%;
            max-width: 700px;
            position: relative;
            z-index: 1;
            animation: fadeUp 700ms ease-out;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-family: "Space Grotesk", sans-serif;
            font-size: 42px;
            color: #fff;
            margin: 0 0 12px;
            text-shadow: 0 0 40px rgba(168, 85, 247, 0.5);
        }

        .header p {
            color: rgba(226, 232, 240, 0.7);
            font-size: 16px;
            margin: 0;
        }

        .upload-card {
            background: linear-gradient(160deg, rgba(15, 23, 42, 0.75), rgba(17, 24, 39, 0.85));
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 28px;
            padding: 48px;
            box-shadow: var(--glow);
            position: relative;
            overflow: hidden;
        }

        .upload-card::before {
            content: "";
            position: absolute;
            top: -50%;
            right: -20%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(34, 211, 238, 0.3), transparent 70%);
            filter: blur(20px);
        }

        .upload-zone {
            border: 2px dashed rgba(34, 211, 238, 0.4);
            border-radius: 20px;
            padding: 60px 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            background: rgba(34, 211, 238, 0.05);
        }

        .upload-zone:hover, .upload-zone.dragover {
            border-color: var(--accent);
            background: rgba(34, 211, 238, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(34, 211, 238, 0.2);
        }

        .upload-icon {
            font-size: 64px;
            margin-bottom: 16px;
            display: block;
        }

        .upload-zone h3 {
            font-family: "Space Grotesk", sans-serif;
            color: #fff;
            font-size: 24px;
            margin: 0 0 8px;
        }

        .upload-zone p {
            color: rgba(226, 232, 240, 0.6);
            margin: 0 0 20px;
            font-size: 14px;
        }

        .btn-browse {
            display: inline-block;
            padding: 12px 32px;
            background: linear-gradient(135deg, var(--accent), var(--accent-3));
            color: #0b0f2b;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 8px 20px rgba(34, 211, 238, 0.3);
        }

        .btn-browse:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(34, 211, 238, 0.4);
        }

        #file-input {
            display: none;
        }

        .selected-file {
            margin-top: 24px;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
            align-items: center;
            gap: 12px;
        }

        .selected-file.visible {
            display: flex;
        }

        .file-icon {
            font-size: 32px;
        }

        .file-info {
            flex: 1;
            text-align: left;
        }

        .file-name {
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .file-size {
            color: rgba(226, 232, 240, 0.5);
            font-size: 12px;
        }

        .btn-upload {
            width: 100%;
            padding: 16px;
            margin-top: 24px;
            background: linear-gradient(135deg, var(--accent-3), var(--accent-2));
            color: #fff;
            border: none;
            border-radius: 14px;
            font-family: "Space Grotesk", sans-serif;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 24px rgba(168, 85, 247, 0.3);
            display: none;
        }

        .btn-upload.visible {
            display: block;
        }

        .btn-upload:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(168, 85, 247, 0.4);
        }

        .btn-upload:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .supported-formats {
            margin-top: 24px;
            text-align: center;
        }

        .supported-formats p {
            color: rgba(226, 232, 240, 0.5);
            font-size: 13px;
            margin: 0 0 12px;
        }

        .format-tags {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .format-tag {
            padding: 6px 14px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: rgba(226, 232, 240, 0.7);
            font-size: 13px;
        }

        .success-message {
            display: none;
            padding: 16px 20px;
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 12px;
            color: #22c55e;
            margin-top: 20px;
            text-align: center;
        }

        .success-message.visible {
            display: block;
            animation: fadeUp 300ms ease-out;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: rgba(226, 232, 240, 0.6);
            text-decoration: none;
            margin-top: 24px;
            font-size: 14px;
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: var(--accent);
        }

        .loading {
            display: none;
            margin-top: 16px;
        }

        .loading.visible {
            display: block;
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="bg-orb one"></div>
    <div class="bg-orb two"></div>
    <div class="bg-orb three"></div>

    <div class="container">
        <div class="header">
            <h1>📄 Upload CV</h1>
            <p>Upload your CV to match with job descriptions using AI</p>
        </div>

        <div class="upload-card">
            <form id="upload-form" enctype="multipart/form-data">
                <div class="upload-zone" id="upload-zone">
                    <span class="upload-icon">📁</span>
                    <h3>Drop your CV here</h3>
                    <p>or click to browse files</p>
                    <button type="button" class="btn-browse">Browse Files</button>
                    <input type="file" id="file-input" name="file" accept=".txt,.md,.html,.htm,.pdf" required>
                </div>

                <div class="selected-file" id="selected-file">
                    <span class="file-icon">📄</span>
                    <div class="file-info">
                        <div class="file-name" id="file-name"></div>
                        <div class="file-size" id="file-size"></div>
                    </div>
                </div>

                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p style="color: rgba(226, 232, 240, 0.6); text-align: center; margin-top: 12px;">
                        Processing your CV...
                    </p>
                </div>

                <button type="submit" class="btn-upload" id="btn-upload">
                    Upload & Process CV
                </button>

                <div class="success-message" id="success-message">
                    ✅ CV uploaded and processed successfully!
                    <br>
                    <a href="/chat" style="color: var(--accent); text-decoration: none; font-weight: 600;">
                        Go to Chat →
                    </a>
                </div>
            </form>

            <div class="supported-formats">
                <p>Supported formats</p>
                <div class="format-tags">
                    <span class="format-tag">.txt</span>
                    <span class="format-tag">.md</span>
                    <span class="format-tag">.html</span>
                    <span class="format-tag">.pdf</span>
                </div>
            </div>
        </div>

        <a href="/" class="back-link">← Back to Home</a>
    </div>

    <script>
        const uploadZone = document.getElementById('upload-zone');
        const fileInput = document.getElementById('file-input');
        const selectedFile = document.getElementById('selected-file');
        const fileName = document.getElementById('file-name');
        const fileSize = document.getElementById('file-size');
        const btnUpload = document.getElementById('btn-upload');
        const uploadForm = document.getElementById('upload-form');
        const loading = document.getElementById('loading');
        const successMessage = document.getElementById('success-message');

        // Handle click to browse
        uploadZone.addEventListener('click', () => fileInput.click());
        uploadZone.querySelector('.btn-browse').addEventListener('click', (e) => {
            e.stopPropagation();
            fileInput.click();
        });

        // Handle file selection
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                fileName.textContent = file.name;
                fileSize.textContent = formatFileSize(file.size);
                selectedFile.classList.add('visible');
                btnUpload.classList.add('visible');
                successMessage.classList.remove('visible');
            }
        });

        // Handle drag and drop
        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });

        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('dragover');
        });

        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) {
                const dataTransfer = new DataTransfer();
                dataTransfer.items.add(file);
                fileInput.files = dataTransfer.files;
                fileName.textContent = file.name;
                fileSize.textContent = formatFileSize(file.size);
                selectedFile.classList.add('visible');
                btnUpload.classList.add('visible');
                successMessage.classList.remove('visible');
            }
        });

        // Handle form submission
        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const file = fileInput.files[0];
            if (!file) return;

            // Show loading
            loading.classList.add('visible');
            btnUpload.disabled = true;
            successMessage.classList.remove('visible');

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    loading.classList.remove('visible');
                    successMessage.classList.add('visible');
                    btnUpload.classList.remove('visible');
                } else {
                    const error = await response.json();
                    alert('Upload failed: ' + (error.detail || 'Unknown error'));
                    loading.classList.remove('visible');
                    btnUpload.disabled = false;
                }
            } catch (error) {
                alert('Upload failed: ' + error.message);
                loading.classList.remove('visible');
                btnUpload.disabled = false;
            }
        });

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }

        // Check for success parameter in URL
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('success') === 'true') {
            successMessage.classList.add('visible');
        }
    </script>
</body>
</html>
